<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Solar-Tracker</title>
  <meta name="description" content="The page you are looking for does not exist.">
  <meta name="theme-color" content="#0f1419" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f4f6f9" media="(prefers-color-scheme: light)">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .notfound {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .notfound h1 {
      margin: 8px 0 16px;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.01em;
    }
    .notfound p {
      color: var(--muted);
      margin: 0 0 28px;
      max-width: 480px;
    }
    .notfound p.notfound-code {
      font-size: clamp(96px, 18vw, 180px);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.04em;
      margin: 0;
      max-width: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <a class="brand" href="/solar-tracker/">
        <img src="logo.png" alt="">
        Solar-Tracker
      </a>
      <div class="nav-links">
        <a href="https://github.com/xenofex7/solar-tracker" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </header>

  <main>
    <div class="notfound">
      <p class="notfound-code">404</p>
      <h1>Page not found</h1>
      <p>The page you are looking for does not exist or has been moved.</p>
      <a class="btn btn-primary" href="/solar-tracker/">Back to Solar-Tracker</a>
    </div>
  </main>

  <footer>
    <p>
      <a href="https://github.com/xenofex7/solar-tracker">GitHub</a> ·
      <a href="https://github.com/xenofex7/solar-tracker/blob/main/CHANGELOG.md">Changelog</a>
    </p>
  </footer>
</body>
</html>
