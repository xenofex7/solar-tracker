<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>{% block title %}Solar-Tracker{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/vendor/chart.umd.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/vendor/chartjs-chart-matrix.min.js') }}"></script>
  <script src="/i18n.js"></script>
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('dashboard') }}">
      <img class="brand-logo brand-logo-light" src="{{ url_for('static', filename='img/logo.png') }}" alt="" width="24" height="24">
      <img class="brand-logo brand-logo-dark" src="{{ url_for('static', filename='img/logo-dark.png') }}" alt="" width="24" height="24">
      <span>Solar-Tracker</span>
    </a>
    {% block header_extra %}{% endblock %}
    <button type="button" id="nav-toggle" class="nav-toggle" aria-label="{{ T.nav_menu }}" aria-expanded="false" aria-controls="nav-menu">
      <svg class="icon-menu" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <nav id="nav-menu">
      <a href="{{ url_for('dashboard') }}">{{ T.nav_dashboard }}</a>
      <a href="{{ url_for('settings_page') }}">{{ T.nav_settings }}</a>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="{{ T.theme_toggle }}" title="{{ T.theme_toggle }}">
        <svg class="icon-system" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="13" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span class="theme-toggle-label"></span>
      </button>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <a href="https://github.com/xenofex7/solar-tracker" target="_blank" rel="noopener">Solar-Tracker</a>
    · <button type="button" class="version-btn" id="open-changelog">v{{ app_version }}</button>
  </footer>
  <div class="modal-backdrop" id="changelog-modal" role="dialog" aria-modal="true" aria-labelledby="changelog-title" aria-hidden="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="changelog-title">Changelog</h2>
        <button type="button" class="modal-close" id="changelog-close" aria-label="{{ T.btn_close }}" title="{{ T.btn_close }}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="changelog-body">
        <p class="muted">{{ T.status_loading }}</p>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
  <script src="{{ url_for('static', filename='js/changelog.js') }}"></script>
</body>
</html>
